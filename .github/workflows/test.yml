name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs: {}

jobs:
  test:
    strategy:
      matrix:
        # A separate run on Windows is needed
        # because typing of stdlib might be different.
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions: {}  # None needed
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7

      - run: uv sync --dev
      - run: uv run --dev ruff format --check src tests
      - run: uv run --dev ruff check src/ggt pyproject.toml
      - run: uv run --dev mypy src/ggt
      - run: uv run --dev ty check src tests
      - run: uv run --dev zizmor .github/workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
