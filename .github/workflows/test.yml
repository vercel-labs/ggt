name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs: {}

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions: {}  # None needed
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7.6.0

      - run: uv sync --dev
      - run: uv run --dev ruff format --check src tests
      - run: uv run --dev ruff check src/ggt pyproject.toml
      - run: uv run --dev mypy
      - run: uv run --dev ty check
      - run: uv run --dev zizmor .github/workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    permissions: {}  # None needed
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7.6.0

      - run: uv sync --dev
      - run: uv run --dev python -m unittest discover -s tests

  summary:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [checks, tests]
    permissions: {}  # None needed
    steps:
      - name: Check required jobs
        env:
          CHECKS_RESULT: ${{ needs.checks.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
        run: |
          echo "checks: ${CHECKS_RESULT}"
          echo "tests: ${TESTS_RESULT}"

          if [ "${CHECKS_RESULT}" != "success" ] || [ "${TESTS_RESULT}" != "success" ]; then
            exit 1
          fi
